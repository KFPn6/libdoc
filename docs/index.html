<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>図書館ダッシュボード</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --warn: #b45309;
      --danger: #dc2626;
      --soon: #ca8a04;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #374151;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic Pro", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    header {
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.5rem;
    }
    .updated {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .count {
      color: var(--muted);
      font-weight: normal;
    }
    .breakdown {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: normal;
    }
    .lib-stat.reservation-full {
      color: var(--danger);
      font-weight: 600;
    }
    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .item {
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .item:first-child { border-top: none; padding-top: 0; }
    .item.duplicate { border-left: 3px solid var(--warn); padding-left: 10px; }
    .item-title {
      font-weight: 600;
    }
    .item-meta, .item-detail {
      color: var(--muted);
      font-weight: normal;
      font-size: 0.9rem;
    }
    .deadline-today { color: var(--danger); font-weight: 600; }
    .deadline-soon { color: var(--soon); font-weight: 600; }
    .empty {
      margin: 0;
      color: var(--muted);
    }
    .status {
      color: var(--muted);
    }
    .status.error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>図書館ダッシュボード</h1>
      <div class="updated" id="updated">読み込み中...</div>
    </header>
    <div id="app">
      <p class="status">データを読み込んでいます...</p>
    </div>
  </div>
  <script>
    const LIBRARY_LABELS = {
      toshima: "豊島区",
      shinjuku: "新宿区",
      nakano: "中野区",
    };
    const LIBRARY_ORDER = ["toshima", "shinjuku", "nakano"];
    const RESERVATION_LIMITS = {
      toshima: 20,
      shinjuku: 10,
      nakano: 15,
    };

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDateTime(iso) {
      return new Date(iso).toLocaleString("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function formatMonthDay(value) {
      if (!value) return "";
      const match = value.replace(/\//g, "-").match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (!match) return value;
      return Number(match[2]) + "/" + Number(match[3]);
    }

    function daysUntil(value) {
      if (!value) return null;
      const target = new Date(value.replace(/\//g, "-"));
      if (Number.isNaN(target.getTime())) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      target.setHours(0, 0, 0, 0);
      return Math.round((target.getTime() - today.getTime()) / 86400000);
    }

    function deadlineClass(value) {
      const days = daysUntil(value);
      if (days === null) return "";
      if (days <= 0) return "deadline-today";
      if (days <= 3) return "deadline-soon";
      return "";
    }

    function itemsByCategory(items, category) {
      return items.filter((item) => item.category === category);
    }

    function renderMeta(item) {
      return escapeHtml(LIBRARY_LABELS[item.library]) + "/" + escapeHtml(item.user);
    }

    function renderItem(item, trailing) {
      return (
        '<li class="item">' +
        '<div class="item-title">' +
        escapeHtml(item.title) +
        ' <span class="item-meta">' +
        renderMeta(item) +
        "</span>" +
        (trailing || "") +
        "</div></li>"
      );
    }

    function renderDuplicateGroup(group) {
      const title = group[0] ? group[0].title : "";
      const locations = group
        .map((item) => LIBRARY_LABELS[item.library] + "（" + item.user + "）")
        .join(" + ");
      return (
        '<li class="item duplicate">' +
        '<div class="item-title">' +
        escapeHtml(title) +
        "</div>" +
        '<div class="item-meta">' +
        escapeHtml(locations) +
        "</div></li>"
      );
    }

    function renderSection(id, title, items, render, hiddenWhenEmpty, breakdown) {
      const count = items.length;
      if (hiddenWhenEmpty && count === 0) return "";

      const body =
        count === 0
          ? '<p class="empty">なし</p>'
          : '<ul class="item-list">' + items.map(render).join("") + "</ul>";

      const breakdownHtml = breakdown
        ? ' <span class="breakdown">' + breakdown + "</span>"
        : "";

      return (
        '<section class="panel" id="' +
        id +
        '">' +
        "<h2>" +
        title +
        ' <span class="count">(' +
        count +
        ")</span>" +
        breakdownHtml +
        "</h2>" +
        body +
        "</section>"
      );
    }

    function renderCountBreakdown(items) {
      return LIBRARY_ORDER.map((library) => {
        const count = items.filter((item) => item.library === library).length;
        return LIBRARY_LABELS[library] + "(" + count + ")";
      }).join("、");
    }

    function renderReservationBreakdown(items) {
      return LIBRARY_ORDER.map((library) => {
        const used = items.filter(
          (item) =>
            item.library === library &&
            item.user === "本人" &&
            (item.category === "reservation" || item.category === "hold_ready"),
        ).length;
        const limit = RESERVATION_LIMITS[library];
        const full = used >= limit ? " reservation-full" : "";
        return (
          '<span class="lib-stat' +
          full +
          '">' +
          LIBRARY_LABELS[library] +
          "(" +
          used +
          "/" +
          limit +
          ")</span>"
        );
      }).join("、");
    }

    function renderDashboard(data) {
      const holdReady = itemsByCategory(data.items, "hold_ready");
      const loans = itemsByCategory(data.items, "loan");
      const reservations = itemsByCategory(data.items, "reservation");

      document.getElementById("updated").textContent =
        "最終更新: " + formatDateTime(data.fetchedAt);

      document.getElementById("app").innerHTML =
        renderSection("duplicates", "重複予約", data.duplicates, renderDuplicateGroup, true) +
        renderSection(
          "hold-ready",
          "受取",
          holdReady,
          (item) => {
            const deadline = formatMonthDay(item.pickupDeadline);
            const cls = deadlineClass(item.pickupDeadline);
            const trailing = deadline
              ? ' <span class="item-detail ' + cls + '">' + escapeHtml(deadline) + "</span>"
              : "";
            return renderItem(item, trailing);
          },
          false,
          renderCountBreakdown(holdReady),
        ) +
        renderSection(
          "loans",
          "返却",
          loans,
          (item) => renderItem(item),
          false,
          renderCountBreakdown(loans),
        ) +
        renderSection(
          "reservations",
          "予約中",
          reservations,
          (item) => renderItem(item),
          false,
          renderReservationBreakdown(data.items),
        );
    }

    async function loadDashboard() {
      const app = document.getElementById("app");
      try {
        const res = await fetch("data.json?t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderDashboard(data);
      } catch (err) {
        document.getElementById("updated").textContent = "読み込み失敗";
        app.innerHTML =
          '<p class="status error">データの取得に失敗しました。ページを再読み込みしてください。</p>';
        console.error(err);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
